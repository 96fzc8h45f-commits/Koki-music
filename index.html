<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeFinder Ultra</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/music-identifier.png">

    <style>
        :root { --accent: #FA243C; --bg: #ffffff; --card-bg: #f5f5f7; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; background: var(--bg); color: #000;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }
        .header {
            width: 100%; padding: 15px; text-align: center; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd;
            padding-top: env(safe-area-inset-top);
        }
        .now-playing-bar {
            width: 100%; background: #fff; padding: 10px 0; border-bottom: 1px solid #ddd;
            font-size: 0.8rem; color: var(--accent); font-weight: bold; overflow: hidden;
        }
        .scroll-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* ジャンル選択ボタンを分かりやすく */
        .genre-container { display: flex; gap: 10px; overflow-x: auto; width: 100%; padding: 15px; box-sizing: border-box; }
        .genre-btn {
            background: var(--card-bg); border: 1px solid #ddd; padding: 10px 20px; border-radius: 20px;
            font-weight: bold; white-space: nowrap; flex-shrink: 0;
        }
        .genre-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .discovery-zone { height: 45vh; display: flex; align-items: center; justify-content: center; width: 100%; margin: 20px 0; }
        .card-container { position: relative; width: 300px; height: 300px; }
        .card {
            position: absolute; width: 100%; height: 100%; background: #fff; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .cd-artwork { width: 260px; height: 260px; border-radius: 50%; object-fit: cover; animation: spin 10s linear infinite; border: 4px solid #333; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #visualizer { width: 90%; height: 40px; margin-bottom: 20px; }
        .fav-section { width: 100%; padding: 20px; background: var(--card-bg); border-top: 1px solid #ddd; }
        .fav-item { display: flex; align-items: center; background: #fff; margin-bottom: 10px; padding: 10px; border-radius: 15px; }
        .fav-item img { width: 40px; height: 40px; border-radius: 5px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="header"><h1 style="font-size: 1.1rem; margin: 0;"> VibeFinder Ultra</h1></div>
<div class="now-playing-bar"><span class="scroll-text" id="nowPlayingText">ジャンルを選んでください ➔</span></div>

<div class="genre-container">
    <button class="genre-btn" onclick="changeGenre('14', this)">J-Pop</button>
    <button class="genre-btn" onclick="changeGenre('1220', this)">K-Pop</button>
    <button class="genre-btn" onclick="changeGenre('29', this)">アニメ</button>
    <button class="genre-btn" onclick="changeGenre('1415', this)">Chill</button>
    <button class="genre-btn" onclick="changeGenre('11', this)">Jazz</button>
</div>

<div class="discovery-zone">
    <div id="cardContainer" class="card-container">
        <div class="card"><p style="color:#888;">ジャンルを選んで<br>発見を開始！</p></div>
    </div>
</div>

<canvas id="visualizer"></canvas>

<div class="fav-section">
    <h2 style="font-size: 1rem;">❤︎ お気に入り</h2>
    <div id="favList"></div>
</div>

<audio id="audioPlayer" crossOrigin="anonymous"></audio>

<script>
    let songs = [], currentIndex = 0;
    const player = document.getElementById('audioPlayer');
    let audioContext, analyser, canvasContext, isAudioInitialized = false;

    // ジャンル切り替え
    async function changeGenre(id, btn) {
        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // iOSオーディオの初期化（ボタンクリック時のみ可能）
        if (!isAudioInitialized) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(player);
            source.connect(analyser); analyser.connect(audioContext.destination);
            canvasContext = document.getElementById('visualizer').getContext('2d');
            isAudioInitialized = true;
            draw();
        }

        document.getElementById('cardContainer').innerHTML = "<p>選曲中...</p>";
        const res = await fetch(`https://itunes.apple.com/search?term=${id}&entity=song&limit=20&country=jp`);
        const data = await res.json();
        songs = data.results;
        currentIndex = 0;
        render();
    }

    function render() {
        if (currentIndex >= songs.length) return;
        const song = songs[currentIndex];
        document.getElementById('nowPlayingText').innerText = `Now Playing: ${song.trackName} - ${song.artistName}     `;
        document.getElementById('cardContainer').innerHTML = `
            <div class="card" onclick="nextSong()">
                <img src="${song.artworkUrl100.replace('100x100','600x600')}" class="cd-artwork">
                <div style="margin-top:15px; font-weight:bold;">${song.trackName}</div>
            </div>`;
        player.src = song.previewUrl;
        player.play();
    }

    function nextSong() { currentIndex++; render(); }

    function draw() {
        requestAnimationFrame(draw);
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const canvas = document.getElementById('visualizer');
        canvasContext.clearRect(0,0,canvas.width,canvas.height);
        canvasContext.fillStyle = '#FA243C';
        for(let i=0; i<data.length; i++) {
            canvasContext.fillRect(i*3, canvas.height, 2, -data[i]/4);
        }
    }
</script>
</body>
</html>

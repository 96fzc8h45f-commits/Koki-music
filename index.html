<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeFinder Ultra</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VibeFinder">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/music-identifier.png">

    <style>
        :root { --accent: #FA243C; --bg: #ffffff; --text: #000000; --card-bg: #f5f5f7; --glass: rgba(255, 255, 255, 0.85); }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 0.5s ease; overflow-x: hidden; -webkit-user-select: none;
        }

        #bgOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); z-index: -1; display: none; }

        /* ヘッダー */
        .header {
            width: 100%; padding: 15px; text-align: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #d2d2d7;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }
        .header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #settingsBtn { background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; padding: 5px 15px; }

        /* 再生中バー */
        .now-playing-bar {
            width: 100%; background: #fff; padding: 8px 0; border-bottom: 1px solid #d2d2d7;
            font-size: 0.8rem; color: var(--accent); font-weight: bold;
            white-space: nowrap; overflow: hidden; position: sticky; top: 60px; z-index: 99;
        }
        .scroll-text { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ジャンル選択 */
        select {
            appearance: none; background: var(--card-bg); color: var(--text);
            border: 1px solid #d2d2d7; padding: 10px 15px; border-radius: 12px;
            font-size: 0.95rem; width: 90%; max-width: 400px; margin: 10px 0;
            text-align: center; font-weight: 500; outline: none;
        }

        /* AI解説エリア */
        .gemini-box {
            width: 90%; max-width: 450px; background: var(--card-bg); border: 1px solid #d2d2d7;
            border-radius: 18px; padding: 15px; margin: 10px 0; font-size: 0.85rem; line-height: 1.5; color: #1d1d1f; box-sizing: border-box;
        }
        .gemini-label { color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }

        /* 巨大CDカード */
        .discovery-zone { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        .card-container { position: relative; width: 80vw; height: 40vh; max-width: 320px; }
        .card {
            position: absolute; width: 100%; height: 100%; background: var(--bg); border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); transition: transform 0.3s ease, opacity 0.3s;
            touch-action: none; border: 1px solid #e5e5e7; overflow: hidden;
        }
        .cd-wrapper { position: relative; width: 75vw; height: 75vw; max-width: 300px; max-height: 300px; }
        .cd-artwork { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; animation: spin 10s linear infinite; border: 5px solid #1d1d1f; box-sizing: border-box; }
        .cd-wrapper::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background-color: var(--bg); border-radius: 50%; z-index: 2; border: 2px solid #555; }

        /* 波形ビジュアライザー */
        #visualizer { width: 90%; max-width: 400px; height: 40px; margin-top: -10px; margin-bottom: 10px; z-index: 10; }

        /* お気に入り */
        .fav-section { width: 100%; padding: 30px 20px; background: var(--card-bg); border-top: 1px solid #d2d2d7; box-sizing: border-box; }
        .fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .save-btn { background: var(--text); border: none; color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .fav-item { display: flex; align-items: center; background: var(--bg); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #e5e5e7; }
        .fav-item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; }
        .fav-info { flex: 1; font-size: 0.85rem; }
        .btn-ap { background: var(--accent); color: #fff; text-decoration: none; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* 設定パネル */
        #settingsPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; background: var(--glass); backdrop-filter: blur(20px);
            z-index: 200; border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid #d2d2d7;
            transition: transform 0.4s ease-out; transform: translateY(100%); padding: 25px; box-sizing: border-box; overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #settingsPanel.active { transform: translateY(0); }
        .bg-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .bg-thumb { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid #e5e5e7; cursor: pointer; }
        .bg-custom { background: #e5e5e7; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #86868b; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="bgOverlay"></div>

<div class="header">
    <div style="width: 50px;"></div>
    <div class="header-center"><h1 style="font-size: 1rem; margin: 0; font-weight: 800;"> VibeFinder Ultra</h1></div>
    <button id="settingsBtn" onclick="toggleSettings()">⚙︎</button>
</div>

<div class="now-playing-bar"><span class="scroll-text" id="nowPlayingText">ジャンルを選んで発見を開始してください...</span></div>

<div style="text-align: center; width: 100%; border-bottom: 1px solid #d2d2d7;">
    <select id="genreSelect" onchange="loadSongs()">
        <option value="14">J-Pop</option>
        <option value="1220">K-Pop</option>
        <option value="29">Anime (アニメ)</option>
        <option value="1415">Lofi / Chill</option>
        <option value="21">Rock</option>
        <option value="pop">Pop</option>
        <option value="11">Jazz</option>
        <option value="5">Classical</option>
        <option value="18">Hip-Hop/Rap</option>
        <option value="17">Dance (エレクトロニック)</option>
    </select>
</div>

<div class="gemini-box" id="geminiBox" style="display:none;">
    <div class="gemini-label">✦ Gemini AI Advice</div>
    <div id="geminiComment">AIがあなたの好みを分析中...</div>
</div>

<div class="discovery-zone">
    <div class="card-container" id="cardContainer"><p style="text-align:center; color:#86868b;">巨大CDを回転させよう！</p></div>
</div>

<canvas id="visualizer"></canvas>

<div class="fav-section">
    <div class="fav-header">
        <h2 style="font-size: 1.1rem; margin: 0; font-weight: 700;">❤︎ Favorites</h2>
        <button class="save-btn" onclick="exportPlaylist()">保存</button>
    </div>
    <div id="favList"></div>
</div>

<div id="settingsPanel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2 style="margin:0;">⚙︎ Customize</h2><button onclick="toggleSettings()" style="background:none; border:none; font-size:24px;">×</button></div>
    <div class="bg-picker" id="bgPicker"><div class="bg-thumb bg-custom" onclick="document.getElementById('fileInput').click()">+</div></div>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleCustomBg(this)">
</div>

<audio id="audioPlayer" crossOrigin="anonymous"></audio>

<script>
    const bgs = ['#ffffff', 'linear-gradient(135deg, #FF9A9E, #FAD0C4)', 'linear-gradient(135deg, #A1C4FD, #C2E9FB)', 'linear-gradient(135deg, #D4FC79, #96E6A1)', 'linear-gradient(135deg, #FAD0C4, #FDD1D9)', 'linear-gradient(135deg, #A8EDEA, #FED6E3)', 'linear-gradient(135deg, #FFF1EB, #ACE0F9)', 'linear-gradient(135deg, #E0C3FC, #8EC5FC)', 'linear-gradient(135deg, #F093FB, #F5576C)', '#000000'];
    let songs = [], favorites = [], currentIndex = 0;
    const player = document.getElementById('audioPlayer'), panel = document.getElementById('settingsPanel');
    let audioContext, analyser, canvasContext, visualizerCanvas, isAudioInitialized = false;

    function initAudioVisualizer() {
        if (isAudioInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 64;
            const source = audioContext.createMediaElementSource(player);
            source.connect(analyser); analyser.connect(audioContext.destination);
            visualizerCanvas = document.getElementById('visualizer');
            canvasContext = visualizerCanvas.getContext('2d');
            isAudioInitialized = true; drawVisualizer();
        } catch (e) { console.error(e); }
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!isAudioInitialized) return;
        const bufferLength = analyser.frequencyBinCount, dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        const width = visualizerCanvas.width, height = visualizerCanvas.height;

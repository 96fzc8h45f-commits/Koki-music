<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeFinder Ultra</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VibeFinder">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/music-identifier.png">

    <style>
        :root { --accent: #FA243C; --bg: #ffffff; --text: #000000; --card-bg: #f5f5f7; --glass: rgba(255, 255, 255, 0.85); }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 0.5s ease; overflow-x: hidden; -webkit-user-select: none;
        }

        #bgOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); z-index: -1; display: none; }

        .header {
            width: 100%; padding: 15px; text-align: center; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #d2d2d7;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }
        
        .header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #settingsBtn { background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; padding: 5px 15px; }

        .now-playing-bar {
            width: 100%; background: #fff; padding: 8px 0; border-bottom: 1px solid #d2d2d7;
            font-size: 0.8rem; color: var(--accent); font-weight: bold;
            white-space: nowrap; overflow: hidden; position: sticky; top: 60px; z-index: 99;
        }
        .scroll-text { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .genre-nav {
            width: 100%; background: #fff; border-bottom: 1px solid #d2d2d7;
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; box-sizing: border-box;
        }
        .genre-nav::-webkit-scrollbar { display: none; }
        .genre-pill {
            background: #f2f2f7; border: none; color: #1d1d1f; padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
        }
        .genre-pill.active { background: var(--accent); color: #fff; }

        .gemini-box {
            width: 90%; max-width: 450px; background: var(--card-bg); border: 1px solid #d2d2d7;
            border-radius: 18px; padding: 15px; margin: 10px 0; font-size: 0.85rem; line-height: 1.5; color: #1d1d1f; box-sizing: border-box;
        }

        .discovery-zone { height: 42vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        .card-container { position: relative; width: 80vw; height: 38vh; max-width: 320px; }
        .card {
            position: absolute; width: 100%; height: 100%; background: var(--bg); border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); transition: transform 0.3s ease, opacity 0.3s;
            touch-action: none; border: 1px solid #e5e5e7; overflow: hidden;
        }
        .cd-wrapper { position: relative; width: 70vw; height: 70vw; max-width: 260px; max-height: 260px; }
        .cd-artwork { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; animation: spin 10s linear infinite; border: 5px solid #1d1d1f; box-sizing: border-box; }

        /* 滑らかで詳細な波形 */
        #visualizer { width: 100%; max-width: 500px; height: 60px; margin-top: -10px; margin-bottom: 10px; z-index: 10; }

        .fav-section { width: 100%; padding: 30px 20px; background: var(--card-bg); border-top: 1px solid #d2d2d7; box-sizing: border-box; }
        .fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .save-btn { background: var(--text); border: none; color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .fav-item { display: flex; align-items: center; background: var(--bg); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #e5e5e7; }
        .fav-item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; }
        .fav-info { flex: 1; font-size: 0.85rem; }
        .btn-ap { background: var(--accent); color: #fff; text-decoration: none; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        #settingsPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; background: var(--glass); backdrop-filter: blur(20px);
            z-index: 200; border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid #d2d2d7;
            transition: transform 0.4s ease-out; transform: translateY(100%); padding: 25px; box-sizing: border-box; overflow-y: auto;
        }
        #settingsPanel.active { transform: translateY(0); }
        .bg-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .bg-thumb { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid #e5e5e7; cursor: pointer; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="bgOverlay"></div>

<div class="header">
    <div style="width: 50px;"></div>
    <div class="header-center"><h1 style="font-size: 1rem; margin: 0; font-weight: 800;"> VibeFinder Ultra</h1></div>
    <button id="settingsBtn" onclick="toggleSettings()">⚙︎</button>
</div>

<div class="now-playing-bar"><span class="scroll-text" id="nowPlayingText">Loading your preferences...</span></div>

<div class="genre-nav" id="genreNav">
    <button class="genre-pill active" onclick="changeGenre('J-Pop', this)">J-Pop</button>
    <button class="genre-pill" onclick="changeGenre('K-Pop', this)">K-Pop</button>
    <button class="genre-pill" onclick="changeGenre('Rock', this)">Rock</button>
    <button class="genre-pill" onclick="changeGenre('City Pop', this)">City Pop</button>
    <button class="genre-pill" onclick="changeGenre('Lofi', this)">Lofi</button>
    <button class="genre-pill" onclick="changeGenre('Jazz', this)">Jazz</button>
</div>

<div class="gemini-box" id="geminiBox" style="display:none;">
    <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">✦ Gemini AI Insights</div>
    <div id="geminiComment">Analyzing your taste...</div>
</div>

<div class="discovery-zone">
    <div class="card-container" id="cardContainer"></div>
</div>

<canvas id="visualizer"></canvas>

<div class="fav-section">
    <div class="fav-header">
        <h2 style="font-size: 1.1rem; margin: 0; font-weight: 700;">❤︎ Favorites</h2>
        <div style="display:flex; gap:10px;">
            <button class="save-btn" style="background:#888;" onclick="clearTaste()">学習リセット</button>
            <button class="save-btn" onclick="exportPlaylist()">保存</button>
        </div>
    </div>
    <div id="favList"></div>
</div>

<div id="settingsPanel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2 style="margin:0;">⚙︎ Customize</h2><button onclick="toggleSettings()" style="background:none; border:none; font-size:24px;">×</button></div>
    <div class="bg-picker" id="bgPicker"></div>
</div>

<audio id="audioPlayer" crossOrigin="anonymous"></audio>

<script>
    const bgs = ['#ffffff', 'linear-gradient(135deg, #FF9A9E, #FAD0C4)', 'linear-gradient(135deg, #A1C4FD, #C2E9FB)', 'linear-gradient(135deg, #D4FC79, #96E6A1)', '#000000'];
    let songs = [], currentIndex = 0;
    
    // ✦ 記憶データの初期化 (LocalStorage)
    let favorites = JSON.parse(localStorage.getItem('vf_favs')) || [];
    let userTaste = JSON.parse(localStorage.getItem('vf_taste')) || { likes: [], dislikes: [] };

    const player = document.getElementById('audioPlayer'), panel = document.getElementById('settingsPanel');
    let audioContext, analyser, canvasContext, visualizerCanvas, isAudioInitialized = false;

    // ✦ 詳細なビジュアライザー設定
    function initAudioVisualizer() {
        if (isAudioInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); 
            analyser.fftSize = 256; // 解像度アップ
            const source = audioContext.createMediaElementSource(player);
            source.connect(analyser); analyser.connect(audioContext.destination);
            visualizerCanvas = document.getElementById('visualizer');
            canvasContext = visualizerCanvas.getContext('2d');
            isAudioInitialized = true; drawVisualizer();
        } catch (e) { console.error(e); }
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!isAudioInitialized) return;
        const bufferLength = analyser.frequencyBinCount, dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        const width = visualizerCanvas.width, height = visualizerCanvas.height;
        canvasContext.clearRect(0, 0, width, height);
        
        const barWidth = (width / bufferLength) * 1.5;
        let x = 0;
        
        for (let i = 0; i < bufferLength; i++) {
            const barHeight = (dataArray[i] / 255) * height;
            // グラデーション効果
            const r = 250; const g = 36 + (i * 2); const b = 60 + (i * 4);
            canvasContext.fillStyle = `rgb(${r},${g},${b})`;
            canvasContext.fillRect(x, height - barHeight, barWidth, barHeight);
            x += barWidth + 1;
        }
    }

    // ✦ 学習に基づいた検索クエリの生成
    async function changeGenre(genreName, btn) {
        if(btn) {
            document.querySelectorAll('.genre-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        initAudioVisualizer();
        document.getElementById('cardContainer').innerHTML = "<p>Analyzing your taste...</p>";

        // 好みのアーティストをランダムに1つ混ぜて提案をパーソナライズ
        let searchQuery = genreName;
        if (userTaste.likes.length > 0 && Math.random() > 0.5) {
            const randomLike = userTaste.likes[Math.floor(Math.random() * userTaste.likes.length)];
            searchQuery += ` ${randomLike}`;
        }

        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchQuery)}&entity=song&limit=30&country=jp&lang=ja_jp`);
        const data = await res.json();
        
        // 嫌いなアーティストを除外
        songs = data.results.filter(s => !userTaste.dislikes.includes(s.artistName));
        currentIndex = 0;
        renderCard();
    }

    function renderCard() {
        const container = document.getElementById('cardContainer');
        if (currentIndex >= songs.length) { container.innerHTML = "終了！別のジャンルへ。"; return; }
        const song = songs[currentIndex];
        document.getElementById('nowPlayingText').innerText = `Now Playing: ${song.trackName} - ${song.artistName}　　　　　`;
        container.innerHTML = `<div class="card" id="currentCard"><div class="cd-wrapper"><img src="${song.artworkUrl100.replace('100x100','600x600')}" class="cd-artwork"></div><div style="margin-top:15px; text-align:center; padding:0 10px; width:100%; box-sizing:border-box;"><div style="font-weight:700; font-size:1rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${song.trackName}</div><div style="color:#86868b; font-size:0.8rem; margin-top:4px;">${song.artistName}</div></div></div>`;
        player.src = song.previewUrl; player.play(); 
        
        // 曲紹介のパーソナライズ
        document.getElementById('geminiBox').style.display = "block";
        let comment = `この曲のテンポは今のあなたに最適です。`;
        if (userTaste.likes.includes(song.artistName)) comment = `大好きな ${song.artistName} の一曲ですね。間違いありません。`;
        document.getElementById('geminiComment').innerText = comment;
        
        setupSwipe(document.getElementById('currentCard'), song);
    }

    function setupSwipe(card, song) {
        let startX = 0; let currentX = 0;
        card.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
        card.addEventListener('touchmove', (e) => {
            currentX = e.touches[0].clientX; let diff = currentX - startX;
            card.style.transform = `translateX(${diff}px) rotate(${diff/20}deg)`;
        });
        card.addEventListener('touchend', () => {
            let diff = currentX - startX;
            if (diff > 100) { handleLike(song); nextSong(); }
            else if (diff < -100) { handleDislike(song); nextSong(); }
            else { card.style.transform = "none"; }
        });
    }

    function handleLike(song) {
        if (!userTaste.likes.includes(song.artistName)) userTaste.likes.push(song.artistName);
        if (!favorites.find(f => f.trackId === song.trackId)) {
            favorites.unshift(song);
            saveData();
            renderFavUI();
        }
    }

    function handleDislike(song) {
        if (!userTaste.dislikes.includes(song.artistName)) {
            userTaste.dislikes.push(song.artistName);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('vf_favs', JSON.stringify(favorites));
        localStorage.setItem('vf_taste', JSON.stringify(userTaste));
    }

    function renderFavUI() {
        const list = document.getElementById('favList');
        list.innerHTML = "";
        favorites.forEach(song => {
            const item = document.createElement('div'); item.className = 'fav-item';
            item.innerHTML = `<img src="${song.artworkUrl60}"><div class="fav-info"><strong>${song.trackName}</strong><br><span>${song.artistName}</span></div><a href="${song.trackViewUrl}" target="_blank" class="btn-ap"> Add</a>`;
            list.appendChild(item);
        });
    }

    function clearTaste() {
        if(confirm("学習データとお気に入りをリセットしますか？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function nextSong() { currentIndex++; renderCard(); }
    function toggleSettings() { panel.classList.toggle('active'); }
    function initBgs() {
        const picker = document.getElementById('bgPicker');
        bgs.forEach(bg => {
            const div = document.createElement('div'); div.className = 'bg-thumb'; div.style.background = bg;
            div.onclick = () => { document.body.style.background = bg; document.getElementById('bgOverlay').style.display = bg === '#ffffff' ? 'none' : 'block'; };
            picker.appendChild(div);
        });
    }
    function exportPlaylist() {
        const list = favorites.map(s => `${s.trackName} - ${s.artistName}`).join('\n');
        navigator.clipboard.writeText(list); alert("プレイリストをコピーしました！");
    }

    window.onload = () => {
        initBgs();
        renderFavUI();
        visualizerCanvas = document.getElementById('visualizer');
        visualizerCanvas.width = visualizerCanvas.offsetWidth * 2;
        visualizerCanvas.height = visualizerCanvas.offsetHeight * 2;
        changeGenre('J-Pop');
    };
</script>
</body>
</html>

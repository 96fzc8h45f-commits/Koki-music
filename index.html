<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeFinder Ultra</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="VibeFinder">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/music-identifier.png">

    <style>
        :root { --accent: #FA243C; --bg: #ffffff; --text: #000000; --card-bg: #f5f5f7; --glass: rgba(255, 255, 255, 0.85); }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 0.5s ease; overflow-x: hidden; -webkit-user-select: none;
        }

        #bgOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); z-index: -1; display: none; }

        .header {
            width: 100%; padding: 15px; text-align: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #d2d2d7;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }
        
        .header-center { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #settingsBtn { background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; padding: 5px 15px; }

        /* 再生中バー */
        .now-playing-bar {
            width: 100%; background: #fff; padding: 8px 0;
            border-bottom: 1px solid #d2d2d7; text-align: center;
            font-size: 0.8rem; color: var(--accent); font-weight: bold;
            white-space: nowrap; overflow: hidden; position: sticky; top: 60px; z-index: 99;
        }
        .scroll-text { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ジャンルナビゲーション */
        .genre-nav {
            width: 100%; background: #fff; border-bottom: 1px solid #d2d2d7;
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; box-sizing: border-box;
            scrollbar-width: none;
        }
        .genre-nav::-webkit-scrollbar { display: none; }
        .genre-pill {
            background: #f2f2f7; border: none; color: #1d1d1f; padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; transition: 0.2s;
        }
        .genre-pill.active { background: var(--accent); color: #fff; }

        /* AI解説エリア */
        .gemini-box {
            width: 90%; max-width: 450px; background: var(--card-bg); border: 1px solid #d2d2d7;
            border-radius: 18px; padding: 15px; margin: 15px 0 10px 0;
            font-size: 0.85rem; line-height: 1.5; color: #1d1d1f; box-sizing: border-box;
        }
        .gemini-label { color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }

        /* 巨大CDカード */
        .discovery-zone { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        .card-container { position: relative; width: 80vw; height: 40vh; max-width: 320px; }
        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--bg); border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, opacity 0.3s; touch-action: none;
            border: 1px solid #e5e5e7; overflow: hidden;
        }

        .cd-wrapper { position: relative; width: 75vw; height: 75vw; max-width: 280px; max-height: 280px; }
        .cd-artwork {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; animation: spin 10s linear infinite;
            border: 5px solid #1d1d1f; box-sizing: border-box;
        }
        .cd-wrapper::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 25px; height: 25px; background-color: var(--bg); border-radius: 50%; z-index: 2; border: 2px solid #555;
        }

        #visualizer { width: 90%; max-width: 400px; height: 40px; margin-top: -10px; margin-bottom: 20px; z-index: 10; }

        .fav-section { width: 100%; padding: 30px 20px; background: var(--card-bg); border-top: 1px solid #d2d2d7; box-sizing: border-box; }
        .fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .save-btn { background: var(--text); border: none; color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .fav-item { display: flex; align-items: center; background: var(--bg); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #e5e5e7; }
        .fav-item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; }
        .fav-info { flex: 1; font-size: 0.85rem; }
        .btn-ap { background: var(--accent); color: #fff; text-decoration: none; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* 設定パネル */
        #settingsPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; background: var(--glass); backdrop-filter: blur(20px);
            z-index: 200; border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid #d2d2d7;
            transition: transform 0.4s ease-out; transform: translateY(100%); padding: 25px; box-sizing: border-box; overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #settingsPanel.active { transform: translateY(0); }
        .bg-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .bg-thumb { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid #e5e5e7; cursor: pointer; }
        .bg-custom { background: #e5e5e7; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #86868b; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="bgOverlay"></div>

<div class="header">
    <div style="width: 50px;"></div>
    <div class="header-center"><h1 style="font-size: 1rem; margin: 0; font-weight: 800;"> VibeFinder Ultra</h1></div>
    <button id="settingsBtn" onclick="toggleSettings()">⚙︎</button>
</div>

<div class="now-playing-bar"><span class="scroll-text" id="nowPlayingText">ジャンルをタップして発見を開始してください...</span></div>

<div class="genre-nav" id="genreNav">
    <button class="genre-pill active" onclick="changeGenre('14', this)">J-Pop</button>
    <button class="genre-pill" onclick="changeGenre('1220', this)">K-Pop</button>
    <button class="genre-pill" onclick="changeGenre('21', this)">Rock</button> <button class="genre-pill" onclick="changeGenre('City Pop', this)">City Pop</button>
    <button class="genre-pill" onclick="changeGenre('29', this)">Anime</button>
    <button class="genre-pill" onclick="changeGenre('1415', this)">Lofi</button>
    <button class="genre-pill" onclick="changeGenre('18', this)">Hip-Hop</button>
    <button class="genre-pill" onclick="changeGenre('11', this)">Jazz</button>
    <button class="genre-pill" onclick="changeGenre('Chillout', this)">Chill</button>
</div>

<div class="gemini-box" id="geminiBox" style="display:none;">
    <div class="gemini-label">✦ Gemini AI Advice</div>
    <div id="geminiComment">曲を分析中...</div>
</div>

<div class="discovery-zone">
    <div class="card-container" id="cardContainer"><p style="text-align:center; color:#86868b;">巨大CDを回転させよう！</p></div>
</div>

<canvas id="visualizer"></canvas>

<div class="fav-section">
    <div class="fav-header">
        <h2 style="font-size: 1.1rem; margin: 0; font-weight: 700;">❤︎ Favorites</h2>
        <button class="save-btn" onclick="exportPlaylist()">保存</button>
    </div>
    <div id="favList"></div>
</div>

<div id="settingsPanel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2 style="margin:0;">⚙︎ Customize</h2><button onclick="toggleSettings()" style="background:none; border:none; font-size:24px;">×</button></div>
    <div class="bg-picker" id="bgPicker"><div class="bg-thumb bg-custom" onclick="document.getElementById('fileInput').click()">+</div></div>
    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleCustomBg(this)">
</div>

<audio id="audioPlayer" crossOrigin="anonymous"></audio>

<script>
    const bgs = ['#ffffff', 'linear-gradient(135deg, #FF9A9E, #FAD0C4)', 'linear-gradient(135deg, #A1C4FD, #C2E9FB)', 'linear-gradient(135deg, #D4FC79, #96E6A1)', 'linear-gradient(135deg, #FAD0C4, #FDD1D9)', 'linear-gradient(135deg, #A8EDEA, #FED6E3)', 'linear-gradient(135deg, #FFF1EB, #ACE0F9)', 'linear-gradient(135deg, #E0C3FC, #8EC5FC)', 'linear-gradient(135deg, #F093FB, #F5576C)', '#000000'];
    let songs = [], favorites = [], currentIndex = 0;
    const player = document.getElementById('audioPlayer'), panel = document.getElementById('settingsPanel');
    let audioContext, analyser, canvasContext, visualizerCanvas, isAudioInitialized = false;

    function initAudioVisualizer() {
        if (isAudioInitialized) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 64;
            const source = audioContext.createMediaElementSource(player);
            source.connect(analyser); analyser.connect(audioContext.destination);
            visualizerCanvas = document.getElementById('visualizer');
            canvasContext = visualizerCanvas.getContext('2d');
            isAudioInitialized = true; drawVisualizer();
        } catch (e) { console.error(e); }
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!isAudioInitialized) return;
        const bufferLength = analyser.frequencyBinCount, dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        const width = visualizerCanvas.width, height = visualizerCanvas.height;
        canvasContext.clearRect(0, 0, width, height);
        const barWidth = (width / bufferLength) * 2.5;
        let x = 0;
        canvasContext.fillStyle = '#FA243C';
        for (let i = 0; i < bufferLength; i++) {
            let barHeight = (dataArray[i] / 255) * height;
            canvasContext.fillRect(x, height - barHeight, barWidth, barHeight);
            x += barWidth + 2;
        }
    }

    function toggleSettings() { panel.classList.toggle('active'); }
    function initBgs() {
        const picker = document.getElementById('bgPicker');
        bgs.forEach((bg) => {
            const div = document.createElement('div'); div.className = 'bg-thumb'; div.style.background = bg;
            div.onclick = () => { document.body.style.background = bg; document.getElementById('bgOverlay').style.display = bg === '#ffffff' ? 'none' : 'block'; };
            picker.appendChild(div);
        });
    }

    function handleCustomBg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; document.getElementById('bgOverlay').style.display = 'block'; toggleSettings(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function changeGenre(id, btn) {
        document.querySelectorAll('.genre-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initAudioVisualizer();
        document.getElementById('cardContainer').innerHTML = "<p>選曲中...</p>";
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(id)}&entity=song&limit=25&country=jp&lang=ja_jp`);
        const data = await res.json();
        songs = data.results;
        currentIndex = 0;
        renderCard();
    }

    function renderCard() {
        const container = document.getElementById('cardContainer');
        if (currentIndex >= songs.length) { container.innerHTML = "終了！"; return; }
        const song = songs[currentIndex];
        document.getElementById('nowPlayingText').innerText = `Now Playing: ${song.trackName} - ${song.artistName}　　　　　`;
        container.innerHTML = `<div class="card" id="currentCard"><div class="cd-wrapper"><img src="${song.artworkUrl100.replace('100x100','600x600')}" class="cd-artwork"></div><div style="margin-top:15px; text-align:center; padding:0 10px; width:100%; box-sizing:border-box;"><div style="font-weight:700; font-size:1rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${song.trackName}</div><div style="color:#86868b; font-size:0.8rem; margin-top:3px;">${song.artistName}</div></div></div>`;
        player.src = song.previewUrl; player.play(); 
        document.getElementById('geminiBox').style.display = "block";
        const insights = [`今のあなたの気分に深く同期しています。`, `洗練されたメロディラインが、空間を彩ります。`, `気に入ったら右にスワイプしてお気に入りへ！` ];
        document.getElementById('geminiComment').innerText = insights[Math.floor(Math.random() * insights.length)];
        setupSwipe(document.getElementById('currentCard'), song);
    }

    function setupSwipe(card, song) {
        let startX = 0; let currentX = 0;
        card.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
        card.addEventListener('touchmove', (e) => {
            currentX = e.touches[0].clientX; let diff = currentX - startX;
            card.style.transform = `translateX(${diff}px) rotate(${diff/20}deg)`;
        });
        card.addEventListener('touchend', () => {
            let diff = currentX - startX;
            if (diff > 100) { addFavorite(song); nextSong(); }
            else if (diff < -100) { nextSong(); }
            else { card.style.transform = "none"; }
        });
    }

    function addFavorite(song) {
        if (!favorites.find(f => f.trackId === song.trackId)) {
            favorites.unshift(song);
            const item = document.createElement('div'); item.className = 'fav-item';
            item.innerHTML = `<img src="${song.artworkUrl60}"><div class="fav-info"><strong>${song.trackName}</strong><br><span>${song.artistName}</span></div><a href="${song.trackViewUrl}" target="_blank" class="btn-ap"> Add</a>`;
            document.getElementById('favList').prepend(item);
        }
    }
    function nextSong() { currentIndex++; renderCard(); }
    function exportPlaylist() {
        const list = favorites.map(s => `${s.trackName} - ${s.artistName}`).join('\n');
        navigator.clipboard.writeText(list); alert("リストをコピーしました！");
    }
    window.onload = () => { initBgs(); visualizerCanvas = document.getElementById('visualizer'); visualizerCanvas.width = visualizerCanvas.offsetWidth; visualizerCanvas.height = visualizerCanvas.offsetHeight; };
</script>
</body>
</html>
